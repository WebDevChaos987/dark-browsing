<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Web&reg;</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: "Lucida Console", "Courier New", monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh; /* Keeps everything inside the screen */
            overflow: hidden;
        }

        header {
            background-color: #2a2a2a;
            padding: 15px;
            border-bottom: 2px solid #708090;
            text-align: center;
            flex-shrink: 0;
        }

        h1 { margin: 0 0 10px 0; font-size: 28px; color: #C0C0C0; }

        input {
            background-color: #000;
            color: #00ff00;
            border: 1px solid #708090;
            padding: 10px;
            width: 70%;
            font-family: inherit;
            outline: none;
        }

        button {
            border-radius: 50%;
            width: 35px;
            height: 35px;
            background-color: #708090;
            color: white;
            cursor: pointer;
            border: none;
            font-size: 18px;
            vertical-align: middle;
        }

        /* The viewing area */
        #browser-viewport {
            flex-grow: 1; /* Takes up all available space between header and footer */
            width: 100%;
            background-color: #111;
            border: none;
        }

        #home-screen {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* FOOTER FIX: Stays at the bottom no matter what */
        footer {
            background-color: #2a2a2a;
            padding: 10px;
            font-size: 14px;
            color: #708090;
            border-top: 1px solid #333;
            flex-shrink: 0;
            text-align: center;
        }

        #status a {
            color: #ff4d4d;
            font-weight: bold;
            text-decoration: underline;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>DARK BROWSER</h1>
        <input type="text" id="addressBar" placeholder="Search FrogFind..." autocomplete="off">
        <button onclick="navigate()">&#9758;</button>
    </header>

    <div id="home-screen">
        <p style="color: #00ff00;">[ SYSTEM ONLINE ]</p>
        <p>Using FrogFind Engine</p>
    </div>

    <iframe id="browser-viewport" style="display:none;"></iframe>

    <footer>
        <div id="status">Status: Ready</div>
    </footer>

    <script>
        const addressBar = document.getElementById('addressBar');
        const viewport = document.getElementById('browser-viewport');
        const home = document.getElementById('home-screen');
        const statusDiv = document.getElementById('status');

        function navigate() {
            let url = addressBar.value.trim();
            if (!url) return;

            // FrogFind Search Logic
            if (!url.includes('.') || url.includes(' ')) {
                url = 'http://frogfind.com/?q=' + encodeURIComponent(url);
            } else {
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }
            }

            loadURL(url);
        }

        function loadURL(url) {
            home.style.display = 'none';
            viewport.style.display = 'block';
            viewport.src = url;
            
            // This updates the footer so you can actually click the link
            statusDiv.innerHTML = `Loading... <a href="${url}" target="_blank">FORCE OPEN LINK</a>`;
        }

        addressBar.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') navigate();
        });
    </script>
</body>
</html>
