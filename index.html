<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Web&reg;</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #1a1a1a;
            color: #ffffff;
            font-family: "Lucida Console", "Courier New", monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            background-color: #2a2a2a;
            padding: 15px;
            border-bottom: 2px solid #708090;
            text-align: center;
            flex-shrink: 0;
        }

        h1 { margin: 0 0 10px 0; font-size: 24px; color: #C0C0C0; }

        .search-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        input {
            background-color: #000;
            color: #00ff00;
            border: 1px solid #708090;
            padding: 10px;
            width: 60%;
            font-family: inherit;
            outline: none;
        }

        button {
            border-radius: 50%;
            width: 40px;
            height: 40px;
            background-color: #708090;
            color: white;
            cursor: pointer;
            border: none;
            font-size: 20px;
            flex-shrink: 0;
        }

        /* The "Emergency" Link next to the button */
        #ext-link {
            display: none; /* Hidden until you search */
            color: #ff4d4d;
            font-weight: bold;
            text-decoration: underline;
            font-size: 12px;
            max-width: 80px;
            line-height: 1;
        }

        #browser-viewport {
            flex-grow: 1;
            width: 100%;
            background-color: #111;
            border: none;
        }

        #home-screen {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        footer {
            background-color: #2a2a2a;
            padding: 5px;
            font-size: 11px;
            color: #555;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Dark Browser</h1>
        <div class="search-container">
            <input type="text" id="addressBar" placeholder="Search Dark Browser..." autocomplete="off">
            <button onclick="navigate()">&#9758;</button>
            <a id="ext-link" href="#" target="_blank">OPEN EXTERNAL</a>
        </div>
    </header>

    <div id="home-screen">
        <p style="color: #00ff00;">[ SYSTEM READY ]</p>
    </div>

    <iframe id="browser-viewport" style="display:none;"></iframe>

    <footer>
        System: Online | Encryption: Active
    </footer>

    <script>
        const addressBar = document.getElementById('addressBar');
        const viewport = document.getElementById('browser-viewport');
        const home = document.getElementById('home-screen');
        const extLink = document.getElementById('ext-link');

        function navigate() {
            let url = addressBar.value.trim();
            if (!url) return;

            if (!url.includes('.') || url.includes(' ')) {
                url = 'http://frogfind.com/?q=' + encodeURIComponent(url);
            } else {
                if (!url.startsWith('http')) {
                    url = 'https://' + url;
                }
            }

            home.style.display = 'none';
            viewport.style.display = 'block';
            viewport.src = url;

            // Make the external link visible and update its destination
            extLink.href = url;
            extLink.style.display = 'inline-block';
        }

        addressBar.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') navigate();
        });
    </script>
</body>
</html>
